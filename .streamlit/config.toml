[theme]
base = "light"
primaryColor = "#EC8500"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F5F5"
textColor = "#1a1a2e"
font = "sans serif"

[server]
headless = true
runOnSave = true
port = 8502

[browser]
gatherUsageStats = false

[client]
# DEBUG TEMPORÁRIO: expor traceback no browser pra diagnosticar erro de deploy.
# Remover após corrigir o bug (dados financeiros não devem vazar por traceback).
showErrorDetails = "full"
